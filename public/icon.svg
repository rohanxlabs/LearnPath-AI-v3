<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#581c87" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0A0A0A" stroke="#1F1F23" stroke-width="4"/>
  <!-- Elegant glowing roadmap path in L shape representing LearnPath -->
  <g filter="url(#glow)">
    <path d="M 160 120 L 160 360 L 360 360" fill="none" stroke="url(#purpleGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="160" cy="120" r="20" fill="#c084fc" />
    <circle cx="260" cy="240" r="16" fill="#8b5cf6" />
    <circle cx="360" cy="360" r="24" fill="#c084fc" />
    <path d="M 160 240 Q 260 240 260 240 L 260 360" fill="none" stroke="#3b82f6" stroke-width="8" stroke-dasharray="16,12" stroke-linecap="round" />
  </g>
</svg>
